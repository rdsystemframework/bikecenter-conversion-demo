<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikecenter Conversion Demo</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
color:#222;
}

header{
background:white;
border-bottom:1px solid #ddd;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.hero{
height:500px;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1517649763962-0c623066013b");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:42px;
margin-bottom:20px;
}

.cta{
background:#ff3b00;
padding:14px 22px;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:4px;
}

.section{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:6px;
overflow:hidden;
border:1px solid #ddd;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

</style>

</head>

<body>

<header>

<div class="logo">
Bikecenter Demo
</div>

<div>
Rennräder • Service • Beratung
</div>

</header>

<section class="hero">

<div>

<h1>Premium Rennräder in Garmisch</h1>

<a class="cta" href="#">
Probefahrt buchen
</a>

</div>

</section>

<section class="section">

<h2>Top Rennräder</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1485965120184-e220f721d03e">
<div class="card-content">
<h3>Carbon Rennrad</h3>
<p>ab 2.499 €</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518655048521-f130df041f66">
<div class="card-content">
<h3>Performance Roadbike</h3>
<p>ab 3.299 €</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-8b456906c813">
<div class="card-content">
<h3>Race Edition</h3>
<p>ab 4.199 €</p>
</div>
</div>

</div>

</section>

<footer>

Bikecenter Conversion Konzept Demo

</footer>

</body>
</html>
