<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bikecenter Rennräder – Demo</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.hero{
height:420px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:8px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

#bike-gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.bike{
background:#1a1a1a;
padding:15px;
border-radius:8px;
text-align:center;
}

.bike img{
width:100%;
border-radius:6px;
}

.button{
display:inline-block;
background:#e60023;
color:white;
padding:12px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.cta{
background:#000;
text-align:center;
padding:60px 20px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

footer{
background:#000;
padding:25px;
text-align:center;
margin-top:40px;
}

</style>

</head>

<body>

<header>
Bikecenter Rennräder Garmisch
</header>

<section class="hero">

<h1>
High-End Rennräder<br>
Probefahrt im Bikecenter möglich
</h1>

</section>

<div class="container">

<h2>Rennräder</h2>

<div id="bike-gallery"></div>

</div>

<section class="cta" id="probefahrt">

<h2>Probefahrt anfragen</h2>

<form action="https://formspree.io/f/mqeykooa" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="E-Mail" required>

<input type="submit" value="Probefahrt anfragen">

</form>

</section>

<footer>
Bikecenter Demo – Rennrad Beratung & Probefahrt
</footer>

<script>

fetch("images/bikecenter.csv")

.then(response => response.text())

.then(data => {

let rows = data.split("\n");

let gallery = document.getElementById("bike-gallery");

rows.slice(1).forEach(row => {

let cols = row.split(",");

let link = cols[0];
let image = cols[1];

if(!image) return;

let bike = document.createElement("div");

bike.className = "bike";

bike.innerHTML = `
<img src="${image}">
<a href="${link}" target="_blank" class="button">Details</a>
<a href="#probefahrt" class="button">Probefahrt</a>
`;

gallery.appendChild(bike);

});

});

</script>

</body>
</html>
