<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bikecenter Rennräder Garmisch – Probefahrt</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.hero{
height:520px;
background-image:url("https://www.bikecenter.de/getimage.php?artikelid=000000-6684eac6617ee&size=xl&image=1");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:8px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.bikes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.bike{
background:#1a1a1a;
padding:15px;
border-radius:8px;
text-align:center;
}

.bike img{
width:100%;
border-radius:6px;
}

.price{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.button{
display:inline-block;
background:#e60023;
color:white;
padding:12px 22px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.cta{
background:#000;
text-align:center;
padding:60px 20px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,select{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

footer{
background:#000;
padding:25px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>
Bikecenter Rennräder Garmisch
</header>

<section class="hero">
<h1>
High-End Rennräder<br>
Probefahrt im Bikecenter möglich
</h1>
</section>

<div class="container">

<h2>Top Rennräder</h2>

<div class="bikes">

<div class="bike">
<img src="https://www.bikecenter.de/getimage.php?artikelid=000000-6684eac6617ee&size=xl&image=1">
<h3>Cervelo R5</h3>
<div class="price">High-End Race Bike</div>
<a class="button" href="#probefahrt">Probefahrt</a>
</div>

<div class="bike">
<img src="https://www.bikecenter.de/getimage.php?artikelid=000000-6684eac6617ee&size=xl&image=1">
<h3>Race Bike</h3>
<div class="price">Performance Road Bike</div>
<a class="button" href="#probefahrt">Probefahrt</a>
</div>

<div class="bike">
<img src="https://www.bikecenter.de/getimage.php?artikelid=000000-6684eac6617ee&size=xl&image=1">
<h3>Premium Rennrad</h3>
<div class="price">Carbon Performance</div>
<a class="button" href="#probefahrt">Probefahrt</a>
</div>

</div>
</div>

<section class="cta" id="probefahrt">

<h2>Probefahrt anfragen</h2>

<form action="https://formspree.io/f/mqeykooa" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="E-Mail" required>

<select name="bike">
<option>Cervelo R5</option>
<option>Pinarello</option>
<option>Specialized</option>
</select>

<input type="submit" value="Probefahrt anfragen">

</form>

</section>

<footer>
Bikecenter Garmisch – Rennräder & Beratung
</footer>

</body>
</html>
